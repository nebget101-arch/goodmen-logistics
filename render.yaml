services:
  - type: web
    name: goodmen-logs-mcp
    runtime: node
    plan: starter
    rootDir: goodmen-logs-mcp-server
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: BACKEND_PATH
        value: https://goodmen-logistics-gateway.onrender.com
      - key: CONFLUENCE_BASE_URL
        sync: false
      - key: CONFLUENCE_EMAIL
        sync: false
      - key: CONFLUENCE_API_TOKEN
        sync: false
      - key: CONFLUENCE_SPACE_KEY
        sync: false

  - type: web
    name: goodmen-logistics-ui
    runtime: static
    rootDir: goodmen-logistics/frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: dist/goodmen-logistics
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: goodmen-logistics-gateway
    runtime: node
    plan: starter
    rootDir: goodmen-logistics/gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REPORTING_SERVICE_URL
        value: https://goodmen-reporting-service.onrender.com
      - key: INTEGRATIONS_SERVICE_URL
        value: https://goodmen-integrations-service.onrender.com
      - key: AUTH_USERS_SERVICE_URL
        value: https://goodmen-auth-users-service.onrender.com
      - key: DRIVERS_COMPLIANCE_SERVICE_URL
        value: https://goodmen-drivers-compliance-service.onrender.com
      - key: VEHICLES_MAINTENANCE_SERVICE_URL
        value: https://goodmen-vehicles-maintenance-service.onrender.com
      - key: LOGISTICS_SERVICE_URL
        value: https://goodmen-logistics-service.onrender.com
      - key: INVENTORY_SERVICE_URL
        value: https://goodmen-inventory-service.onrender.com
      - key: CORS_ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10002

  - type: web
    name: goodmen-reporting-service
    runtime: node
    plan: starter
    rootDir: microservices/reporting-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10003

  - type: web
    name: goodmen-integrations-service
    runtime: node
    plan: starter
    rootDir: microservices/integrations-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10004

  - type: web
    name: goodmen-auth-users-service
    runtime: node
    plan: starter
    rootDir: microservices/auth-users-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/microservices/auth-users-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10005

  - type: web
    name: goodmen-drivers-compliance-service
    runtime: node
    plan: starter
    rootDir: microservices/drivers-compliance-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/microservices/drivers-compliance-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10006

  - type: web
