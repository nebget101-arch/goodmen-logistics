  - type: web
    name: goodmen-inventory-service
    runtime: node
    plan: starter
    rootDir: microservices/inventory-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/microservices/inventory-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
