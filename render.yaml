services:
  - type: web
    name: fleetneuron-logistics-ui
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build -- --configuration=production
    staticPublishPath: dist/goodmen-logistics
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: fleetneuron-logistics-gateway
    runtime: node
    plan: starter
    rootDir: backend/gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REPORTING_SERVICE_URL
        value: https://fleetneuron-reporting-service.onrender.com
      - key: INTEGRATIONS_SERVICE_URL
        value: https://fleetneuron-integrations-service.onrender.com
      - key: AUTH_USERS_SERVICE_URL
        value: https://fleetneuron-auth-users-service.onrender.com
      - key: DRIVERS_COMPLIANCE_SERVICE_URL
        value: https://fleetneuron-drivers-compliance-service.onrender.com
      - key: VEHICLES_MAINTENANCE_SERVICE_URL
        value: https://fleetneuron-vehicles-maintenance-service.onrender.com
      - key: LOGISTICS_SERVICE_URL
        value: https://fleetneuron-logistics-service.onrender.com
      - key: INVENTORY_SERVICE_URL
        value: https://fleetneuron-inventory-service.onrender.com
      - key: AI_SERVICE_URL
        value: https://fleetneuron-ai-service.onrender.com
      - key: CORS_ORIGIN
        value: https://fleetneuron.ai,https://dev.fleetneuron.ai,https://fleetneuron-logistics-ui.onrender.com,http://localhost:4200
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10002

  - type: web
    name: fleetneuron-reporting-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/reporting-service
    # Autodeploy on this service's dir + the shared package it consumes.
    # buildFilter paths are repo-root-relative & inclusive (rootDir alone misses backend/packages/**).
    buildFilter:
      paths:
        - backend/microservices/reporting-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/reporting-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10003

  - type: web
    name: fleetneuron-integrations-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/integrations-service
    buildFilter:
      paths:
        - backend/microservices/integrations-service/**
        - backend/packages/goodmen-shared/**
        - backend/packages/goodmen-database/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/integrations-service/node_modules
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10004
      # Telematics ingestion (FN-1653). Set secret values in the Render dashboard —
      # never commit secret values. TELEMATICS_WEBHOOK_SECRET gates the ?secret=
      # query param; the per-provider *_SAMSARA/*_MOTIVE secrets verify the HMAC
      # signature header; the *_API_TOKEN values authenticate the polling fallback.
      - key: TELEMATICS_SAMSARA_API_TOKEN
        sync: false
      - key: TELEMATICS_MOTIVE_API_TOKEN
        sync: false
      - key: TELEMATICS_WEBHOOK_SECRET
        sync: false
      - key: TELEMATICS_WEBHOOK_SECRET_SAMSARA
        sync: false
      - key: TELEMATICS_WEBHOOK_SECRET_MOTIVE
        sync: false
      # Enable the in-process polling-fallback scheduler (single-instance plan).
      - key: TELEMATICS_POLL_INTERVAL_MINUTES
        value: 10

  - type: web
    name: fleetneuron-auth-users-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/auth-users-service
    buildFilter:
      paths:
        - backend/microservices/auth-users-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/auth-users-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM_EMAIL
        sync: false
      - key: ONBOARDING_FROM_EMAIL
        sync: false
      - key: TRIAL_REQUEST_NOTIFY_TO
        sync: false
      - key: SALES_NOTIFY_EMAILS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: PUBLIC_APP_BASE_URL
        sync: false
      # FN-1729: full URL of the deployed reset-password page. Without this the
      # emailed reset link falls back to http://localhost:4200/reset-password
      # (a dead link for users). Public, non-secret URL — hardcoded like CORS_ORIGIN
      # so the deploy is self-correcting. Frontend host from the CORS allowlist.
      - key: PASSWORD_RESET_URL_BASE
        value: https://fleetneuron.ai/reset-password
      - key: TRIAL_PUBLIC_BASE_URL
        sync: false
      - key: TRIAL_SIGNUP_URL_TEMPLATE
        sync: false
      # Stripe billing — secrets + per-plan price IDs (FN-1686 go-live).
      # See docs/deploy/stripe-go-live.md for how to obtain each value.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_BASIC
        sync: false
      - key: STRIPE_PRICE_MULTI_MC
        sync: false
      - key: STRIPE_PRICE_END_TO_END
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: STRIPE_PRICE_EXTRA_USER_SEAT
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10005

  # Dedicated migration service (no HTTP port). Deploy this service to run DB migrations.
  # It will run latest migrations, then stay alive.
  - type: worker
    name: fleetneuron-db-migrations
    runtime: node
    plan: starter
    rootDir: backend/packages/goodmen-database
    buildCommand: npm install
    startCommand: sh -c "npx knex migrate:latest --env production --knexfile ./knexfile.js && echo 'Migrations completed' && sleep infinity"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: NODE_ENV
        value: production

  # Telematics partition maintenance (FN-1662 / FN-1660). Daily: pre-creates
  # upcoming vehicle_position_pings daily partitions + drops partitions past the
  # 30-day retention horizon. pg_cron is unavailable on Render, so this runs as a
  # scheduled job. The SQL function pre-creates a forward buffer, so a missed run
  # is harmless; a multi-day outage (>~7d) would block inserts for new days.
  - type: cron
    name: fleetneuron-telematics-partition-cron
    runtime: node
    plan: starter
    rootDir: backend/packages/goodmen-database
    schedule: "30 7 * * *"
    buildCommand: npm install
    startCommand: node scripts/maintain_telematics_partitions.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: NODE_ENV
        value: production

  - type: web
    name: fleetneuron-drivers-compliance-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/drivers-compliance-service
    buildFilter:
      paths:
        - backend/microservices/drivers-compliance-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/drivers-compliance-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: AI_SERVICE_URL
        value: https://fleetneuron-ai-service.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10006

  - type: web
    name: fleetneuron-vehicles-maintenance-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/vehicles-maintenance-service
    buildFilter:
      paths:
        - backend/microservices/vehicles-maintenance-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/vehicles-maintenance-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10007

  - type: web
    name: fleetneuron-logistics-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/logistics-service
    buildFilter:
      paths:
        - backend/microservices/logistics-service/**
        - backend/packages/goodmen-shared/**
        - backend/packages/goodmen-database/**
    buildCommand: npm install
    preDeployCommand: npx --prefix ../../packages/goodmen-database knex migrate:latest --env production --knexfile ../../packages/goodmen-database/knexfile.js
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/logistics-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: AI_SERVICE_URL
        value: https://fleetneuron-ai-service.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10008

  - type: web
    name: fleetneuron-inventory-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/inventory-service
    buildFilter:
      paths:
        - backend/microservices/inventory-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/inventory-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10009

  - type: web
    name: fleetneuron-ai-service
    runtime: node
    plan: starter
    rootDir: backend/microservices/ai-service
    buildFilter:
      paths:
        - backend/microservices/ai-service/**
        - backend/packages/goodmen-shared/**
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/ai-service/node_modules
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGIN
        value: https://fleetneuron.ai
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10010
      - key: AI_SERVICE_PORT
        value: 10010

databases:
  - name: safetyapp-db
    databaseName: goodmen_logistics
    user: goodmen_user
    plan: basic-256mb
