<div class="app-shell">
  <div class="sidebar-backdrop" *ngIf="isLoggedIn() && sidebarOpen" (click)="closeSidebar()" aria-hidden="true"></div>

  <aside class="sidebar" *ngIf="isLoggedIn()" [class.mobile-open]="sidebarOpen">
    <div class="sidebar-header">
      <img src="assets/goodmen-logo-simple.svg" alt="Goodmen Logistics Logo">
      <div class="brand">
        <div class="brand-title">GOODMEN</div>
        <div class="brand-subtitle">Logistics</div>
      </div>
    </div>
    <nav class="sidebar-nav" (click)="onSidebarNavClick($event)">
      <ul class="nav-links">
        <li *ngIf="canSee('dashboard')"><a routerLink="/dashboard" routerLinkActive="active"><span class="nav-icon">📊</span>Dashboard</a></li>
        <li *ngIf="canSee('loads')"><a routerLink="/loads" routerLinkActive="active"><span class="nav-icon">📦</span>Loads</a></li>
        <!-- Dispatch / Admin drivers view -->
        <li *ngIf="canSee('drivers') && (userRole === 'dispatch' || userRole === 'admin')">
          <a routerLink="/drivers" routerLinkActive="active"><span class="nav-icon">👤</span>Drivers</a>
        </li>
        <li class="nav-section" *ngIf="canSee('vehicles')">
          <button class="section-toggle" (click)="toggleEquipment()" type="button" [attr.aria-expanded]="equipmentExpanded">
            <span class="section-icon">🚛</span>
            <span class="section-label">Equipment</span>
            <span class="toggle-chevron" [class.rotated]="equipmentExpanded">▶</span>
          </button>
        </li>
        <li *ngIf="canSee('vehicles') && equipmentExpanded" class="nav-subsection"><a routerLink="/vehicles" routerLinkActive="active">Trucks</a></li>
        <li *ngIf="canSee('vehicles') && equipmentExpanded" class="nav-subsection"><a routerLink="/trailers" routerLinkActive="active">Trailers</a></li>
        <li *ngIf="canSee('hos') || canSee('audit')" class="nav-section">
          <button class="section-toggle" (click)="toggleSafety()" type="button" [attr.aria-expanded]="safetyExpanded">
            <span class="section-icon">🛡️</span>
            <span class="section-label">Safety</span>
            <span class="toggle-chevron" [class.rotated]="safetyExpanded">▶</span>
          </button>
        </li>
        <li *ngIf="canSee('hos') && safetyExpanded" class="nav-subsection"><a routerLink="/hos" routerLinkActive="active">HOS</a></li>
        <li *ngIf="canSee('drivers') && safetyExpanded && (userRole === 'safety' || userRole === 'admin')" class="nav-subsection">
          <a routerLink="/drivers/dqf" routerLinkActive="active">DQF</a>
        </li>
        <li *ngIf="canSee('audit') && safetyExpanded" class="nav-subsection"><a routerLink="/audit" routerLinkActive="active">Audit</a></li>
        <li *ngIf="canSee('maintenance') || canSee('parts') || canSee('customers')" class="nav-section">
          <button class="section-toggle" (click)="toggleFleet()" type="button" [attr.aria-expanded]="fleetExpanded">
            <span class="section-icon">🚚</span>
            <span class="section-label">Fleet</span>
            <span class="toggle-chevron" [class.rotated]="fleetExpanded">▶</span>
          </button>
        </li>
        <li *ngIf="canSee('maintenance') && fleetExpanded" class="nav-subsection"><a routerLink="/maintenance" routerLinkActive="active">Maintenance</a></li>
        <li *ngIf="canSee('customers') && fleetExpanded" class="nav-subsection"><a routerLink="/customers" routerLinkActive="active">Customers</a></li>
        <li *ngIf="canSee('parts') || canSee('barcodes') || canSee('receiving') || canSee('transfers') || canSee('sales') || canSee('inventory_reports')" class="nav-section">
          <button class="section-toggle" (click)="toggleInventory()" type="button" [attr.aria-expanded]="inventoryExpanded">
            <span class="section-icon">📦</span>
            <span class="section-label">Inventory</span>
            <span class="toggle-chevron" [class.rotated]="inventoryExpanded">▶</span>
          </button>
        </li>
        <li *ngIf="canSee('parts') && inventoryExpanded" class="nav-subsection"><a routerLink="/parts" routerLinkActive="active">Parts</a></li>
        <li *ngIf="canSee('barcodes') && inventoryExpanded" class="nav-subsection"><a routerLink="/barcodes" routerLinkActive="active">Barcode Management</a></li>
        <li *ngIf="canSee('receiving') && inventoryExpanded" class="nav-subsection"><a routerLink="/receiving" routerLinkActive="active">Warehouse Receiving</a></li>
        <li *ngIf="canSee('transfers') && inventoryExpanded" class="nav-subsection"><a routerLink="/inventory-transfers" routerLinkActive="active">Transfers</a></li>
        <li *ngIf="canSee('sales') && inventoryExpanded" class="nav-subsection"><a routerLink="/direct-sales" routerLinkActive="active">Direct Sales</a></li>
        <li *ngIf="canSee('inventory_reports') && inventoryExpanded" class="nav-subsection"><a routerLink="/inventory-reports" routerLinkActive="active">Reports</a></li>
        <li *ngIf="canSee('invoices')" class="nav-section">
          <button class="section-toggle" (click)="toggleAccounting()" type="button" [attr.aria-expanded]="accountingExpanded">
            <span class="section-icon">💰</span>
            <span class="section-label">Accounting</span>
            <span class="toggle-chevron" [class.rotated]="accountingExpanded">▶</span>
          </button>
        </li>
        <li *ngIf="canSee('invoices') && accountingExpanded" class="nav-subsection"><a routerLink="/invoices" routerLinkActive="active">Invoices</a></li>
        <li *ngIf="userRole === 'admin'"><a routerLink="/users/create" routerLinkActive="active"><span class="nav-icon">➕</span>Add User</a></li>
      </ul>
    </nav>
    <div class="sidebar-actions">
      <button (click)="logout()" class="btn btn-ghost">Logout</button>
    </div>
  </aside>

  <main class="content">
    <div class="mobile-topbar" *ngIf="isLoggedIn()">
      <button class="mobile-menu-btn" type="button" (click)="toggleSidebar()" [attr.aria-expanded]="sidebarOpen" aria-label="Toggle menu">
        ☰
      </button>

      <div class="mobile-topbar-brand">
        <img src="assets/goodmen-logo-simple.svg" alt="Goodmen Logistics Logo">
        <span class="mobile-topbar-title">GOODMEN</span>
      </div>

      <button (click)="logout()" class="btn btn-ghost mobile-logout">Logout</button>
    </div>

    <div class="topbar" *ngIf="!isLoggedIn()">
      <div class="topbar-brand">
        <img src="assets/goodmen-logo-simple.svg" alt="Goodmen Logistics Logo">
        <div>
          <div class="brand-title">GOODMEN</div>
          <div class="brand-subtitle">Logistics</div>
        </div>
      </div>
      <button routerLink="/login" class="btn btn-primary">Login</button>
    </div>
    <router-outlet></router-outlet>
  </main>
</div>
