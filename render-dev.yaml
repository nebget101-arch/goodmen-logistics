# DEV ENVIRONMENT — auto-deploys from dev branch
services:
  - type: web
    name: fleetneuron-logistics-ui-dev
    runtime: static
    branch: dev
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build -- --configuration=devBuild
    staticPublishPath: dist/goodmen-logistics
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: fleetneuron-logistics-gateway-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/gateway
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: REPORTING_SERVICE_URL
        value: https://fleetneuron-reporting-service-dev.onrender.com
      - key: INTEGRATIONS_SERVICE_URL
        value: https://fleetneuron-integrations-service-dev.onrender.com
      - key: AUTH_USERS_SERVICE_URL
        value: https://fleetneuron-auth-users-service-dev.onrender.com
      - key: DRIVERS_COMPLIANCE_SERVICE_URL
        value: https://fleetneuron-drivers-compliance-service-kmpd.onrender.com
      - key: VEHICLES_MAINTENANCE_SERVICE_URL
        value: https://fleetneuron-vehicles-maintenance-service-giz4.onrender.com
      - key: LOGISTICS_SERVICE_URL
        value: https://fleetneuron-logistics-service-dev.onrender.com
      - key: INVENTORY_SERVICE_URL
        value: https://fleetneuron-inventory-service-dev.onrender.com
      - key: AI_SERVICE_URL
        value: https://fleetneuron-ai-service-dev.onrender.com
      - key: CORS_ORIGIN
        value: https://dev.fleetneuron.ai
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10002

  - type: web
    name: fleetneuron-reporting-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/reporting-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/reporting-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10003

  - type: web
    name: fleetneuron-integrations-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/integrations-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/integrations-service/node_modules
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10004

  - type: web
    name: fleetneuron-auth-users-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/auth-users-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/auth-users-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10005

  # Dedicated migration service (no HTTP port). Deploy this service to run DB migrations.
  # It will run latest migrations, then stay alive.
  - type: worker
    name: fleetneuron-db-migrations-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/packages/goodmen-database
    buildCommand: npm install
    startCommand: sh -c "npx knex migrate:latest --env production --knexfile ./knexfile.js && echo 'Migrations completed' && sleep infinity"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: NODE_ENV
        value: production

  - type: web
    name: fleetneuron-drivers-compliance-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/drivers-compliance-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/drivers-compliance-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10006

  - type: web
    name: fleetneuron-vehicles-maintenance-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/vehicles-maintenance-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/vehicles-maintenance-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10007

  - type: web
    name: fleetneuron-logistics-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/logistics-service
    buildCommand: npm install
    preDeployCommand: npx --prefix ../../packages/goodmen-database knex migrate:latest --env production --knexfile ../../packages/goodmen-database/knexfile.js
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/logistics-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        sync: false
      - key: R2_REGION
        value: auto
      - key: R2_SIGNED_URL_EXPIRES_SECONDS
        value: 900
      - key: AI_SERVICE_URL
        value: https://fleetneuron-ai-service-dev.onrender.com
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10008

  - type: web
    name: fleetneuron-inventory-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/inventory-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/inventory-service/node_modules
      - key: DATABASE_URL
        fromDatabase:
          name: safetyapp-dev-db
          property: connectionString
      - key: PG_DATABASE
        fromDatabase:
          name: safetyapp-dev-db
          property: database
      - key: PG_USER
        fromDatabase:
          name: safetyapp-dev-db
          property: user
      - key: PG_PASSWORD
        fromDatabase:
          name: safetyapp-dev-db
          property: password
      - key: PG_HOST
        fromDatabase:
          name: safetyapp-dev-db
          property: host
      - key: PG_PORT
        fromDatabase:
          name: safetyapp-dev-db
          property: port
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10009

  - type: web
    name: fleetneuron-ai-service-dev
    runtime: node
    branch: dev
    plan: starter
    rootDir: backend/microservices/ai-service
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_PATH
        value: /opt/render/project/src/backend/microservices/ai-service/node_modules
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: CORS_ORIGIN
        value: https://dev.fleetneuron.ai
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10010
      - key: AI_SERVICE_PORT
        value: 10010

  # ── SigNoz Observability Stack (Dev) ───────────────────────────
  # Self-hosted SigNoz: ClickHouse + OTel Collector + Dashboard
  # See infra/signoz/README.md for full documentation

  - type: pserv
    name: signoz-clickhouse-dev
    runtime: docker
    branch: dev
    dockerfilePath: infra/signoz/Dockerfile.clickhouse
    plan: starter_plus
    disk:
      name: clickhouse-data-dev
      mountPath: /var/lib/clickhouse
      sizeGB: 10
    envVars:
      - key: CLICKHOUSE_DB
        value: signoz
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false

  - type: web
    name: signoz-otel-collector-dev
    runtime: docker
    branch: dev
    dockerfilePath: infra/signoz/Dockerfile.otel-collector
    plan: starter
    envVars:
      - key: CLICKHOUSE_HOST
        fromService:
          type: pserv
          name: signoz-clickhouse-dev
          property: host
      - key: CLICKHOUSE_PORT
        value: "9000"
      - key: CLICKHOUSE_DB
        value: signoz
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false

  - type: web
    name: signoz-dashboard-dev
    runtime: docker
    branch: dev
    dockerfilePath: infra/signoz/Dockerfile.query-service
    plan: starter
    envVars:
      - key: CLICKHOUSE_HOST
        fromService:
          type: pserv
          name: signoz-clickhouse-dev
          property: host
      - key: CLICKHOUSE_PORT
        value: "9000"
      - key: SIGNOZ_TELEMETRY_ENABLED
        value: "false"
      - key: CLICKHOUSE_DB
        value: signoz
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_PASSWORD
        sync: false

databases:
  - name: safetyapp-dev-db
    databaseName: goodmen_logistics_dev
    user: goodmen_user_dev
    plan: basic-256mb
