<div class="fuel-shell">
  <header class="fuel-header">
    <div class="fuel-title-row">
      <span class="material-symbols-outlined fuel-icon">local_gas_station</span>
      <div>
        <h1>Fuel</h1>
        <p class="fuel-subtitle">Import, match, and report on fleet fuel transactions.</p>
      </div>
    </div>
  </header>

  <nav class="fuel-tabs">
    <button
      *ngFor="let tab of tabs"
      type="button"
      class="fuel-tab"
      [class.active]="activeTab === tab.path"
      (click)="navigate(tab)"
    >
      <span class="material-symbols-outlined">{{ tab.icon }}</span>
      <span>{{ tab.label }}</span>
    </button>
  </nav>

  <div class="fuel-content">
    <router-outlet></router-outlet>
  </div>
</div>
