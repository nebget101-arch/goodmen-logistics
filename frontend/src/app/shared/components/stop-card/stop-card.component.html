<!-- FN-734 — Stop Card: collapsed / expanded inline edit -->
<div class="sc-card" [class.sc-card--expanded]="expanded">

  <!-- ── Collapsed header row ───────────────────────────────────────────── -->
  <div class="sc-header" (click)="onToggle()">
    <!-- Drag handle (visible to parent cdkDrag) -->
    <span class="sc-drag-handle" cdkDragHandle title="Drag to reorder">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <circle cx="5" cy="3" r="1.5"/>
        <circle cx="11" cy="3" r="1.5"/>
        <circle cx="5" cy="8" r="1.5"/>
        <circle cx="11" cy="8" r="1.5"/>
        <circle cx="5" cy="13" r="1.5"/>
        <circle cx="11" cy="13" r="1.5"/>
      </svg>
    </span>

    <!-- Sequence number -->
    <span class="sc-seq">{{ sequenceLabel }}</span>

    <!-- Stop type badge -->
    <span class="sc-badge"
          [class.sc-badge--pickup]="stop.stop_type === 'PICKUP'"
          [class.sc-badge--delivery]="stop.stop_type === 'DELIVERY'">
      {{ stop.stop_type }}
    </span>

    <!-- City / State -->
    <span class="sc-location">{{ cityStateLabel }}</span>

    <!-- Date -->
    <span class="sc-date">{{ dateLabel }}</span>

    <!-- Expand / collapse arrow -->
    <span class="sc-arrow" [class.sc-arrow--up]="expanded">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
        <path d="M3.5 5.25L7 8.75L10.5 5.25" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </span>
  </div>

  <!-- ── Expanded edit form ─────────────────────────────────────────────── -->
  <div class="sc-body" *ngIf="expanded">

    <div class="sc-form-grid">

      <!-- Stop type -->
      <div class="sc-field">
        <label class="sc-label">Stop Type</label>
        <select class="sc-select"
                [value]="stop.stop_type"
                (change)="onStopTypeChange($any($event.target).value)">
          <option *ngFor="let opt of stopTypeOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

      <!-- Facility name -->
      <div class="sc-field">
        <label class="sc-label">Facility Name</label>
        <input class="sc-input" type="text"
               placeholder="e.g. ABC Distribution"
               [value]="stop.facility_name || ''"
               (input)="onFieldChange('facility_name', $any($event.target).value)"/>
      </div>

      <!-- City -->
      <div class="sc-field">
        <label class="sc-label">City</label>
        <input class="sc-input" type="text"
               placeholder="City"
               [value]="stop.city || ''"
               (input)="onFieldChange('city', $any($event.target).value)"/>
      </div>

      <!-- State -->
      <div class="sc-field">
        <label class="sc-label">State</label>
        <select class="sc-select"
                [value]="stop.state || ''"
                (change)="onFieldChange('state', $any($event.target).value)">
          <option value="">--</option>
          <option *ngFor="let st of stateList" [value]="st">{{ st }}</option>
        </select>
      </div>

      <!-- ZIP -->
      <div class="sc-field">
        <label class="sc-label">ZIP</label>
        <input class="sc-input" type="text"
               placeholder="ZIP code"
               maxlength="10"
               [value]="stop.zip || ''"
               (input)="onFieldChange('zip', $any($event.target).value)"/>
      </div>

      <!-- Date -->
      <div class="sc-field">
        <label class="sc-label">Date</label>
        <input class="sc-input" type="date"
               [value]="stop.stop_date || ''"
               (input)="onFieldChange('stop_date', $any($event.target).value)"/>
      </div>

      <!-- Time -->
      <div class="sc-field">
        <label class="sc-label">Time</label>
        <input class="sc-input" type="time"
               [value]="stop.stop_time || ''"
               (input)="onFieldChange('stop_time', $any($event.target).value)"/>
      </div>

      <!-- Notes (full width) -->
      <div class="sc-field sc-field--full">
        <label class="sc-label">Notes</label>
        <textarea class="sc-textarea"
                  rows="2"
                  placeholder="Special instructions..."
                  [value]="stop.notes || ''"
                  (input)="onFieldChange('notes', $any($event.target).value)"></textarea>
      </div>
    </div>

    <!-- ── Card actions row ─────────────────────────────────────────────── -->
    <div class="sc-actions">
      <button class="sc-btn sc-btn--secondary" type="button" (click)="onDuplicate()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
             stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="4" width="9" height="9" rx="1.5"/>
          <path d="M10 4V2.5A1.5 1.5 0 008.5 1H2.5A1.5 1.5 0 001 2.5v6A1.5 1.5 0 002.5 10H4"/>
        </svg>
        Duplicate
      </button>

      <ng-container *ngIf="!disableDelete">
        <button *ngIf="!showDeleteConfirm"
                class="sc-btn sc-btn--danger" type="button"
                (click)="onDeleteClick(); $event.stopPropagation()">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.75 3.5h10.5M5.25 6.125v3.5M8.75 6.125v3.5"/>
            <path d="M2.625 3.5l.583 7.583A1.167 1.167 0 004.373 12.25h5.254a1.167 1.167 0 001.165-1.167L11.375 3.5"/>
            <path d="M4.667 3.5v-1.75a.583.583 0 01.583-.583h3.5a.583.583 0 01.583.583V3.5"/>
          </svg>
          Delete
        </button>
        <span *ngIf="showDeleteConfirm" class="sc-confirm-row">
          <span class="sc-confirm-text">Remove stop?</span>
          <button class="sc-btn sc-btn--danger-solid" type="button" (click)="onDeleteConfirm()">Yes</button>
          <button class="sc-btn sc-btn--secondary" type="button" (click)="onDeleteCancel()">No</button>
        </span>
      </ng-container>
    </div>
  </div>
</div>
