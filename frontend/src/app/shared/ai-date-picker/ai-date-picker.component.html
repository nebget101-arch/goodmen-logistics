<label *ngIf="label" class="ai-date-picker-label" [attr.for]="inputId || null">{{ label }}</label>
<mat-form-field
  appearance="outline"
  class="ai-date-picker-field ai-date-picker-field--external-label"
  subscriptSizing="dynamic"
>
  <input
    matInput
    [attr.id]="inputId || null"
    [matDatepicker]="picker"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [name]="name"
    [min]="min"
    [max]="max"
    [ngModel]="value"
    (ngModelChange)="onDateChange($event)"
    (blur)="onBlur()"
    [attr.aria-label]="ariaLabel || label || placeholder || 'Select date'"
    [attr.aria-describedby]="ariaDescribedBy || null"
    autocomplete="off"
  />
  <mat-datepicker-toggle matSuffix [for]="picker" [disabled]="disabled"></mat-datepicker-toggle>
  <mat-datepicker
    #picker
    [startView]="startView"
    [touchUi]="touchUi"
    panelClass="ai-datepicker-overlay"
  ></mat-datepicker>
</mat-form-field>
