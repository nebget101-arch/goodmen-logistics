<mat-form-field
  appearance="outline"
  class="ai-date-picker-field"
  [class.ai-date-picker-field--external-label]="!label"
  subscriptSizing="dynamic"
  [floatLabel]="$any(label ? 'auto' : 'never')"
>
  <mat-label *ngIf="label">{{ label }}</mat-label>
  <input
    matInput
    [attr.id]="inputId || null"
    [matDatepicker]="picker"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [name]="name"
    [min]="min"
    [max]="max"
    [ngModel]="value"
    (ngModelChange)="onDateChange($event)"
    (blur)="onBlur()"
    [attr.aria-label]="ariaLabel || label || placeholder || 'Select date'"
    autocomplete="off"
  />
  <mat-datepicker-toggle matSuffix [for]="picker" [disabled]="disabled"></mat-datepicker-toggle>
  <mat-datepicker
    #picker
    [startView]="startView"
    [touchUi]="touchUi"
    panelClass="ai-datepicker-overlay"
  ></mat-datepicker>
</mat-form-field>
