<div class="auth-page">
  <div class="auth-card">
    <div class="auth-pill">Secure Reset</div>
    <h1>Set a new password</h1>
    <p class="auth-sub">Use at least 8 characters and keep it secure.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success" novalidate>
      <label class="auth-label" for="newPassword">New password</label>
      <input
        id="newPassword"
        class="auth-input"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        placeholder="••••••••"
      />

      <label class="auth-label" for="confirmPassword">Confirm password</label>
      <input
        id="confirmPassword"
        class="auth-input"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        placeholder="••••••••"
      />

      <div class="auth-error" *ngIf="form.get('password')?.touched && form.get('password')?.hasError('minlength')">
        Password must be at least 8 characters.
      </div>
      <div class="auth-error" *ngIf="passwordMismatch">Passwords do not match.</div>

      <button class="auth-btn" type="submit" [disabled]="submitting">
        {{ submitting ? 'Updating…' : 'Update password' }}
      </button>
    </form>

    <output class="auth-confirm" *ngIf="success" aria-live="polite">
      Password updated successfully. Redirecting to sign in…
    </output>

    <button class="auth-link" type="button" (click)="goToLogin()">Back to sign in</button>
    <div class="auth-error" *ngIf="error">{{ error }}</div>
  </div>
</div>
