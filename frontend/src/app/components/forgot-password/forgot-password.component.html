<div class="auth-page">
  <div class="auth-card">
    <div class="auth-pill">Account Recovery</div>
    <h1>Forgot your password?</h1>
    <p class="auth-sub">Enter your email and we’ll send you a secure reset link.</p>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!submitted" novalidate>
      <label class="auth-label" for="forgotEmail">Email</label>
      <input
        id="forgotEmail"
        type="email"
        class="auth-input"
        formControlName="email"
        placeholder="you@company.com"
        autocomplete="email"
      />
      <div class="auth-error" *ngIf="emailInvalid">Please enter a valid email address.</div>

      <button class="auth-btn" type="submit" [disabled]="submitting">
        {{ submitting ? 'Sending…' : 'Send reset link' }}
      </button>
    </form>

    <output class="auth-confirm" *ngIf="submitted" aria-live="polite">
      If an account exists for that email, a reset link has been sent.
    </output>

    <button class="auth-link" type="button" (click)="goToLogin()">Back to sign in</button>

    <div class="auth-error" *ngIf="error">{{ error }}</div>
  </div>
</div>
