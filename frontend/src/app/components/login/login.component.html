<div class="login-page">
  <div class="login-visual">
    <div class="ai-orbit">
      <div class="ai-orbit-ring ring-1"></div>
      <div class="ai-orbit-ring ring-2"></div>
      <div class="ai-orbit-ring ring-3"></div>
      <div class="ai-core">
        <span class="ai-core-glow"></span>
        <span class="ai-core-dot"></span>
      </div>
    </div>
    <div class="login-visual-copy">
      <h1>FleetNeuron</h1>
      <p>AI-driven visibility for your fleet, inventory, and operations.</p>
    </div>
  </div>

  <div class="login-panel">
    <div class="login-panel-header">
      <div class="login-pill">AI Console Access</div>
      <h2>Sign in to your workspace</h2>
      <p>Use your company credentials to continue.</p>
    </div>

    <form (ngSubmit)="login()" class="login-form" novalidate>
      <output *ngIf="success" class="success" aria-live="polite">
        {{ success }}
      </output>

      <div *ngIf="error" class="error" role="alert">
        {{ error }}
      </div>

      <label class="field">
        <span class="field-label">Username</span>
        <div class="field-input-wrapper">
          <span class="field-icon material-symbols-outlined" aria-hidden="true">person</span>
          <input
            type="text"
            [(ngModel)]="username"
            name="username"
            required
            [disabled]="isSigningIn"
            autocomplete="username"
            placeholder="john.doe@company.com"
          >
        </div>
      </label>

      <label class="field">
        <span class="field-label">Password</span>
        <div class="field-input-wrapper">
          <span class="field-icon material-symbols-outlined" aria-hidden="true">lock</span>
          <input
            [(ngModel)]="password"
            name="password"
            type="password"
            required
            [disabled]="isSigningIn"
            autocomplete="current-password"
            placeholder="••••••••"
          >
        </div>
      </label>

      <button type="submit" class="login-button" [disabled]="isSigningIn">
        <span>{{ isSigningIn ? 'Signing in…' : 'Continue' }}</span>
        <span class="login-button-glow"></span>
      </button>

      <button type="button" class="forgot-password-link" [disabled]="isSigningIn" (click)="goToForgotPassword()">
        Forgot password?
      </button>

      <p class="login-meta">
        Protected by FleetNeuron AI anomaly detection.
      </p>
    </form>
  </div>
</div>
