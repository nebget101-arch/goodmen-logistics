<!-- FN-862 / S2: 4-step load wizard shell. Step bodies are placeholders filled by S3–S6. -->
<div class="load-wizard-overlay" role="dialog" aria-modal="true" aria-label="Load wizard">
  <div class="load-wizard-backdrop" (click)="onClose()"></div>

  <div class="load-wizard-panel">
    <app-wizard-shell
      [steps]="steps"
      [currentStepId]="currentStepId"
      [canProceed]="canProceed"
      [mode]="shellMode"
      (stepChange)="onStepChange($event)"
      (back)="onBack()"
      (next)="onNext()"
      (submit)="onSubmit()"
      (close)="onClose()"
    >
      <!-- ── Step bodies (placeholders for S2) ─────────────────────────── -->
      <ng-container [ngSwitch]="currentStepId">
        <app-load-wizard-basics
          *ngSwitchCase="'basics'"
          data-testid="step-basics"
          [basics]="basics"
          [mode]="mode"
        ></app-load-wizard-basics>

        <app-load-wizard-stops
          *ngSwitchCase="'stops'"
          [stops]="stops"
          [rate]="ratePerMileInput"
          [mode]="mode"
          data-testid="step-stops"
        ></app-load-wizard-stops>

        <app-load-wizard-driver-equipment
          *ngSwitchCase="'driver'"
          data-testid="step-driver"
          [driverEquipment]="driverEquipment"
          [mode]="mode"
        ></app-load-wizard-driver-equipment>

        <div *ngSwitchCase="'attachments'" class="step-attachments" data-testid="step-attachments">
          <app-load-wizard-attachments
            [attachmentsGroup]="attachmentsGroup"
            [mode]="mode"
            [loadId]="loadId"
            [existingAttachments]="existingAttachments"
            (attachmentUploaded)="onAttachmentUploaded($event)"
            (existingDeleted)="onExistingDeleted($event)"
          ></app-load-wizard-attachments>

          <div class="submit-error" *ngIf="errorMessage" role="alert" data-testid="submit-error">
            {{ errorMessage }}
          </div>

          <div class="submitting-hint" *ngIf="submitting" aria-live="polite">
            Saving load…
          </div>
        </div>
      </ng-container>
    </app-wizard-shell>
  </div>
</div>
