<div class="dp-shell" role="main">
  <header class="dp-shell__header" role="banner">
    <span class="dp-shell__wordmark" aria-label="FleetNeuron Driver Portal">
      FleetNeuron
    </span>
  </header>

  <nav class="dp-shell__nav" aria-label="Driver portal navigation">
    <ul class="dp-shell__nav-list" role="list">
      <li *ngFor="let item of navItems" class="dp-shell__nav-item">
        <a
          class="dp-shell__nav-link"
          [routerLink]="item.path"
          routerLinkActive="dp-shell__nav-link--active"
          [attr.aria-current]="null"
          [routerLinkActiveOptions]="{ exact: false }"
        >
          <span class="dp-shell__nav-icon" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <ng-container *ngIf="item.icon === 'warning'">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </ng-container>
            </svg>
          </span>
          <span class="dp-shell__nav-label">{{ item.label }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <main class="dp-shell__content">
    <router-outlet />
  </main>
</div>
