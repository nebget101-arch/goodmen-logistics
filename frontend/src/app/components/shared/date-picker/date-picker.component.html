<mat-form-field appearance="outline" class="ai-date-field" color="primary">
  <mat-label *ngIf="label">{{ label }}</mat-label>
  <input
    matInput
    [matDatepicker]="picker"
    [placeholder]="placeholder"
    [disabled]="disabled"
    [name]="name"
    [ngModel]="value"
    (ngModelChange)="value = $event"
  />
  <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker
    #picker
    [startView]="startView"
    [touchUi]="touchUi"
  ></mat-datepicker>
</mat-form-field>
