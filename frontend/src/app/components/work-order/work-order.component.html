<div class="work-order-dashboard container">
  <div class="header">
    <div>
      <h1>Work Order</h1>
      <p class="subtitle">Maintenance, repair, and service tracking</p>
    </div>
  </div>

  <div class="card work-order-card">
    <!-- Status Bar -->
    <app-wo-status-bar
      [workOrder]="workOrder"
      [invoiceInfo]="invoiceInfo"
      [isEditMode]="isEditMode"
      [workOrderSaveError]="workOrderSaveError"
      [workOrderSaveSuccess]="workOrderSaveSuccess"
      [workOrderLoadError]="workOrderLoadError"
      (save)="submitWorkOrder()"
      (cancel)="cancelWorkOrder()"
      (generateInvoice)="generateInvoice()"
    ></app-wo-status-bar>

    <!-- Tab Navigation -->
    <nav class="wo-tab-nav">
      <button
        *ngFor="let tab of tabs"
        type="button"
        class="wo-tab-btn"
        [class.active]="activeTab === tab.id"
        (click)="setActiveTab(tab.id)"
      >
        {{ tab.label }}
      </button>
    </nav>

    <!-- Tab Content -->
    <form (ngSubmit)="submitWorkOrder()" #workOrderForm="ngForm" class="wo-tab-content">

      <!-- Tab 1: Basics -->
      <div *ngIf="activeTab === 'basics'">
        <app-wo-basics-tab
          #basicsTab
          [workOrder]="workOrder"
          [customers]="customers"
          [vehicles]="vehicles"
          [locations]="locations"
          [technicians]="technicians"
          [isEditMode]="isEditMode"
          [customerCreditLimit]="customerCreditLimit"
          [availableCredit]="availableCredit"
          [creditCheckLoading]="creditCheckLoading"
          [useCustomerCredit]="useCustomerCredit"
          [creditCheckError]="creditCheckError"
        ></app-wo-basics-tab>
      </div>

      <!-- Tab 2: Service Details -->
      <div *ngIf="activeTab === 'service'">
        <app-wo-service-details-tab
          [workOrder]="workOrder"
          [partsCatalog]="partsCatalog"
        ></app-wo-service-details-tab>
      </div>

      <!-- Tab 3: Work (Parts & Labor) -->
      <div *ngIf="activeTab === 'work'">
        <app-wo-work-tab
          [workOrder]="workOrder"
          [workOrderId]="workOrderId"
          [partsCatalog]="partsCatalog"
          [locations]="locations"
          [technicians]="technicians"
          [workOrderParts]="workOrderParts"
          (reloadWorkOrder)="onWorkTabReload()"
        ></app-wo-work-tab>
      </div>

      <!-- Tab 4: Financials & Billing -->
      <div *ngIf="activeTab === 'financials'">
        <app-wo-financials-tab
          [workOrder]="workOrder"
          [workOrderId]="workOrderId"
          [invoiceInfo]="invoiceInfo"
          [isEditMode]="isEditMode"
          [customerCreditLimit]="customerCreditLimit"
          [availableCredit]="availableCredit"
          [creditCheckLoading]="creditCheckLoading"
          [useCustomerCredit]="useCustomerCredit"
          [creditCheckError]="creditCheckError"
          (generateInvoice)="generateInvoice()"
          (useCustomerCreditChange)="onCreditToggle($event)"
        ></app-wo-financials-tab>
      </div>

      <!-- Tab 5: Notes & Attachments -->
      <div *ngIf="activeTab === 'notes'">
        <app-wo-notes-tab
          [workOrder]="workOrder"
          [workOrderId]="workOrderId"
          [documents]="documents"
          [files]="files"
          (reloadWorkOrder)="onNotesTabReload()"
        ></app-wo-notes-tab>
      </div>

    </form>
  </div>
</div>
