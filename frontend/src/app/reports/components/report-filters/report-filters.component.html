<div class="report-filters">
  <div class="filter-row">
    <label>Location</label>
    <select [(ngModel)]="localFilters.location_id" (change)="onApply()">
      <option value="">All</option>
      <option *ngFor="let loc of locations" [value]="loc.id">{{ loc.name }}</option>
    </select>
  </div>
  <div class="filter-row">
    <label>From</label>
    <input type="date" [(ngModel)]="localFilters.date_from" />
  </div>
  <div class="filter-row">
    <label>To</label>
    <input type="date" [(ngModel)]="localFilters.date_to" />
  </div>
  <button type="button" class="btn btn-primary" (click)="onApply()">Apply</button>
  <button type="button" class="btn btn-secondary" (click)="onClear()">Clear</button>
</div>
