<div class="device-dialog">
  <h2 class="dialog-title">{{ isEdit ? 'Edit Device' : 'Add Device' }}</h2>

  <form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">
    <!-- Toll Account (required) -->
    <div class="form-field">
      <label class="field-label">Toll Account <span class="required">*</span></label>
      <select formControlName="toll_account_id" class="field-input">
        <option value="" disabled>Select account</option>
        <option *ngFor="let acct of data.accounts" [value]="acct.id">
          {{ acct.display_name || acct.provider_name }} — {{ acct.account_number_masked || 'N/A' }}
        </option>
      </select>
      <div *ngIf="form.get('toll_account_id')?.touched && form.get('toll_account_id')?.hasError('required')"
           class="field-error">
        Toll account is required.
      </div>
    </div>

    <!-- Device Number -->
    <div class="form-field">
      <label class="field-label">Device Number</label>
      <input type="text"
             formControlName="device_number"
             class="field-input"
             placeholder="e.g. 1234-5678"
             [attr.readonly]="isEdit ? true : null">
    </div>

    <!-- Plate Number -->
    <div class="form-field">
      <label class="field-label">Plate Number</label>
      <input type="text"
             formControlName="plate_number"
             class="field-input"
             placeholder="e.g. ABC-1234">
    </div>

    <!-- Truck (autocomplete) -->
    <div class="form-field">
      <label class="field-label">Truck</label>
      <input type="text"
             [formControl]="truckControl"
             class="field-input"
             placeholder="Search by unit number..."
             (input)="form.patchValue({ truck_id: '' })"
             autocomplete="off">
      <div class="autocomplete-dropdown" *ngIf="(filteredTrucks$ | async) as trucks">
        <div *ngIf="trucks.length > 0 && truckControl.value && !form.value.truck_id"
             class="autocomplete-list">
          <div *ngFor="let t of trucks"
               class="autocomplete-item"
               (click)="onTruckSelected(t.id); truckControl.setValue(t.label)">
            {{ t.label }}
          </div>
        </div>
      </div>
    </div>

    <!-- Driver (autocomplete) -->
    <div class="form-field">
      <label class="field-label">Driver</label>
      <input type="text"
             [formControl]="driverControl"
             class="field-input"
             placeholder="Search by driver name..."
             (input)="form.patchValue({ driver_id: '' })"
             autocomplete="off">
      <div class="autocomplete-dropdown" *ngIf="(filteredDrivers$ | async) as drivers">
        <div *ngIf="drivers.length > 0 && driverControl.value && !form.value.driver_id"
             class="autocomplete-list">
          <div *ngFor="let d of drivers"
               class="autocomplete-item"
               (click)="onDriverSelected(d.id); driverControl.setValue(d.label)">
            {{ d.label }}
          </div>
        </div>
      </div>
    </div>

    <!-- Effective Start Date -->
    <div class="form-field">
      <label class="field-label">Effective Start Date</label>
      <input type="date"
             formControlName="effective_start_date"
             class="field-input">
    </div>

    <!-- Effective End Date -->
    <div class="form-field">
      <label class="field-label">Effective End Date</label>
      <input type="date"
             formControlName="effective_end_date"
             class="field-input">
    </div>

    <!-- Status -->
    <div class="form-field" *ngIf="isEdit">
      <label class="field-label">Status</label>
      <select formControlName="status" class="field-input">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <!-- Error message -->
    <div *ngIf="errorMsg" class="error-banner">{{ errorMsg }}</div>

    <!-- Actions -->
    <div class="dialog-actions">
      <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="saving">
        Cancel
      </button>
      <button type="submit" class="btn-save" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
      </button>
    </div>
  </form>
</div>
