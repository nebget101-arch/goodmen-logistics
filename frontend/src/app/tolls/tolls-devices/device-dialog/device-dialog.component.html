<div class="device-dialog">
  <h2 class="dialog-title">{{ isEdit ? 'Edit Device' : 'Add Device' }}</h2>

  <form [formGroup]="form" (ngSubmit)="save()" class="dialog-form">
    <!-- Toll Account (required) -->
    <div class="form-field">
      <label class="field-label" for="toll-account-input">Toll Account <span class="required">*</span></label>
      <select id="toll-account-input" formControlName="toll_account_id" class="field-input">
        <option value="" disabled>Select account</option>
        <option *ngFor="let acct of data.accounts" [value]="acct.id">
          {{ acct.display_name || acct.provider_name }} — {{ acct.account_number_masked || 'N/A' }}
        </option>
      </select>
      <div *ngIf="form.get('toll_account_id')?.touched && form.get('toll_account_id')?.hasError('required')"
           class="field-error">
        Toll account is required.
      </div>
    </div>

    <!-- Device Number -->
    <div class="form-field">
      <label class="field-label" for="device-number-input">Device Number</label>
      <input type="text"
             id="device-number-input"
             formControlName="device_number"
             class="field-input"
             placeholder="e.g. 1234-5678"
             [attr.readonly]="isEdit ? true : null">
    </div>

    <!-- Driver (autocomplete) -->
    <div class="form-field">
      <label class="field-label" for="driver-name-input">Driver Name</label>
      <input type="text"
             id="driver-name-input"
             [formControl]="driverControl"
             class="field-input"
             placeholder="Search by driver name..."
             (input)="clearDriverSelection()"
             autocomplete="off">
      <div class="autocomplete-dropdown" *ngIf="(filteredDrivers$ | async) as drivers">
        <div *ngIf="drivers.length > 0 && driverControl.value && !form.value.driver_id"
             class="autocomplete-list">
          <button *ngFor="let d of drivers"
               type="button"
               class="autocomplete-item"
               (click)="onDriverSelected(d.id); driverControl.setValue(d.label)">
            {{ d.label }}
          </button>
        </div>
      </div>
    </div>

    <!-- Truck Unit Number -->
    <div class="form-field">
      <label class="field-label" for="truck-unit-input">Truck Unit Number</label>
      <input type="text"
             id="truck-unit-input"
             [formControl]="truckControl"
             class="field-input"
             placeholder="Search by unit number..."
             (input)="clearTruckSelection()"
             autocomplete="off">
      <div class="autocomplete-dropdown" *ngIf="(filteredTrucks$ | async) as trucks">
        <div *ngIf="trucks.length > 0 && truckControl.value && !form.value.truck_id"
             class="autocomplete-list">
          <button *ngFor="let t of trucks"
               type="button"
               class="autocomplete-item"
               (click)="onTruckSelected(t.id)">
            {{ t.label }}
          </button>
        </div>
      </div>
    </div>

    <!-- Truck Plate Number -->
    <div class="form-field">
      <label class="field-label" for="truck-plate-input">Truck Plate Number</label>
      <input type="text"
             id="truck-plate-input"
             formControlName="truck_plate_number"
             class="field-input"
             placeholder="e.g. ABC-1234">
    </div>

    <!-- Trailer -->
    <div class="form-field">
      <label class="field-label" for="trailer-input">Trailer</label>
      <input type="text"
             id="trailer-input"
             [formControl]="trailerControl"
             class="field-input"
             placeholder="Search by trailer unit..."
             (input)="clearTrailerSelection()"
             autocomplete="off">
      <div class="autocomplete-dropdown" *ngIf="(filteredTrailers$ | async) as trailers">
        <div *ngIf="trailers.length > 0 && trailerControl.value && !form.value.trailer_id"
             class="autocomplete-list">
          <button *ngFor="let trailer of trailers"
               type="button"
               class="autocomplete-item"
               (click)="onTrailerSelected(trailer.id)">
            {{ trailer.label }}
          </button>
        </div>
      </div>
    </div>

    <!-- Trailer Plate Number -->
    <div class="form-field">
      <label class="field-label" for="trailer-plate-input">Trailer Plate Number</label>
      <input type="text"
             id="trailer-plate-input"
             formControlName="trailer_plate_number"
             class="field-input"
             placeholder="Blank if no trailer assigned">
    </div>

    <!-- Effective Start Date -->
    <div class="form-field">
      <label class="field-label" for="effective-start-input">Effective Start Date</label>
      <input type="date"
             id="effective-start-input"
             formControlName="effective_start_date"
             class="field-input">
    </div>

    <!-- Effective End Date -->
    <div class="form-field">
      <label class="field-label" for="effective-end-input">Effective End Date</label>
      <input type="date"
             id="effective-end-input"
             formControlName="effective_end_date"
             class="field-input">
    </div>

    <!-- Status -->
    <div class="form-field" *ngIf="isEdit">
      <label class="field-label" for="status-input">Status</label>
      <select id="status-input" formControlName="status" class="field-input">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <!-- Error message -->
    <div *ngIf="errorMsg" class="error-banner">{{ errorMsg }}</div>

    <!-- Actions -->
    <div class="dialog-actions">
      <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="saving">
        Cancel
      </button>
      <button type="submit" class="btn-save" [disabled]="saving">
        {{ saving ? 'Saving...' : (isEdit ? 'Update' : 'Create') }}
      </button>
    </div>
  </form>
</div>
