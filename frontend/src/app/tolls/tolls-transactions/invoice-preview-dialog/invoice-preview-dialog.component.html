<div class="invoice-preview-dialog">
  <div class="dialog-header">
    <h2>Review Extracted Transactions</h2>
    <button class="close-btn" (click)="cancel()" aria-label="Close dialog">
      <span class="material-icons">close</span>
    </button>
  </div>

  <!-- Warnings banner -->
  <div class="warnings-banner" *ngIf="warnings.length">
    <span class="material-icons warning-icon">warning</span>
    <ul>
      <li *ngFor="let w of warnings">{{ w }}</li>
    </ul>
  </div>

  <!-- Error banner -->
  <div class="error-banner" *ngIf="error">
    <span class="material-icons">error</span>
    <span>{{ error }}</span>
  </div>

  <!-- Empty state -->
  <div class="empty-state" *ngIf="!rows.length && !saving">
    <span class="material-icons">receipt_long</span>
    <p>No transactions were extracted from the invoice.</p>
  </div>

  <!-- Transaction table -->
  <div class="table-wrapper" *ngIf="rows.length">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Provider</th>
          <th>Plaza</th>
          <th>Plate</th>
          <th>Amount</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>Flags</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows; let i = index" [class.flagged]="row.plate_unmatched || row.possible_duplicate">
          <td>
            <input type="date" [(ngModel)]="row.transaction_date" class="cell-input" />
          </td>
          <td>
            <input type="text" [(ngModel)]="row.provider_name" class="cell-input" />
          </td>
          <td>
            <input type="text" [(ngModel)]="row.plaza_name" class="cell-input" />
          </td>
          <td>
            <input type="text" [(ngModel)]="row.plate_number" class="cell-input"
              [class.warn-input]="row.plate_unmatched" />
          </td>
          <td>
            <input type="number" [(ngModel)]="row.amount" class="cell-input amount-input" step="0.01" />
          </td>
          <td>
            <input type="text" [(ngModel)]="row.entry_point" class="cell-input" />
          </td>
          <td>
            <input type="text" [(ngModel)]="row.exit_point" class="cell-input" />
          </td>
          <td class="flags-cell">
            <span class="badge badge-warn" *ngIf="row.plate_unmatched" title="Plate not matched to a known vehicle">
              Unmatched
            </span>
            <span class="badge badge-dup" *ngIf="row.possible_duplicate" title="Possible duplicate transaction">
              Duplicate?
            </span>
          </td>
          <td>
            <button class="remove-btn" (click)="removeRow(i)" title="Remove row" [disabled]="saving">
              <span class="material-icons">delete_outline</span>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Actions -->
  <div class="dialog-actions">
    <span class="row-count" *ngIf="rows.length">{{ rows.length }} transaction{{ rows.length === 1 ? '' : 's' }}</span>
    <div class="action-buttons">
      <button class="btn-cancel" (click)="cancel()" [disabled]="saving">Cancel</button>
      <button class="btn-confirm" (click)="confirmAll()" [disabled]="saving || !rows.length">
        <span class="spinner" *ngIf="saving"></span>
        <span *ngIf="!saving">Confirm All</span>
        <span *ngIf="saving">Saving...</span>
      </button>
    </div>
  </div>
</div>
